<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ZPA Mini-SIEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #2f5496; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); padding: 2.5rem; width: 100%; max-width: 380px; }
        .login-card h1 { text-align: center; color: #2f5496; margin-bottom: 0.3rem; font-size: 1.4rem; }
        .login-card .subtitle { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-bottom: 1rem; }
        input:focus { outline: none; border-color: #2f5496; box-shadow: 0 0 0 2px rgba(47,84,150,0.15); }
        button { width: 100%; padding: 0.7rem; background: #2f5496; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1e3a6e; }
        .error { background: #fde8e8; color: #c0392b; padding: 0.6rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ZPA Mini-SIEM</h1>
        <p class="subtitle">Session Dashboard</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>

# /etc/rsyslog.d/10-zpa.conf
# Receive all incoming syslog via TCP and write to dedicated ZPA log file.

# Enable TCP syslog reception
module(load="imtcp")
input(type="imtcp" port="514")

# Route all remote syslog to ZPA log file, then stop processing
# so they don't also end up in /var/log/messages.
if $fromhost-ip != '127.0.0.1' then {
    action(type="omfile" file="/var/log/zpa/zpa.log"
           fileCreateMode="0640"
           fileOwner="root"
           fileGroup="root"
           dirCreateMode="0750"
           dirOwner="root"
           dirGroup="root")
    stop
}
